# ===== 卧室床头区 =====

- alias: "卧室床头区 - 有人开灯"
  id: presence_bedroom_bed_light_on
  trigger:
    - platform: state
      entity_id: binary_sensor.bedroom_bed_area_person_occupancy
      to: "on"
  condition:
    - condition: state
      entity_id: input_boolean.smart_presence_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.smart_presence_dnd
      state: "off"
    # 深夜使用低亮度
  action:
    - choose:
        # 22:00 - 07:00 夜间模式：低亮度暖光
        - conditions:
            - condition: time
              after: "22:00:00"
              before: "07:00:00"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.bedroom_bedside_lamp
              data:
                brightness_pct: 20
                color_temp_kelvin: 2700
      # 默认：正常亮度
      default:
        - service: light.turn_on
          target:
            entity_id: light.bedroom_bedside_lamp
          data:
            brightness_pct: 60
            color_temp_kelvin: 3500
  mode: single

- alias: "卧室床头区 - 无人关灯"
  id: presence_bedroom_bed_light_off
  trigger:
    - platform: state
      entity_id: binary_sensor.bedroom_bed_area_person_occupancy
      to: "off"
      for:
        minutes: 5  # 卧室延迟稍长
  condition:
    - condition: state
      entity_id: input_boolean.smart_presence_enabled
      state: "on"
  action:
    - service: light.turn_off
      target:
        entity_id: light.bedroom_bedside_lamp
  mode: single

