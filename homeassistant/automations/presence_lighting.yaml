# ============================================================
# Home Assistant 自动化：书房人体位置感知灯光联动
# ============================================================
# 使用方法：
#   在 HA 中进入 设置 -> 自动化 -> 右上角三点 -> 从 YAML 创建
#   或通过 HA 的 configuration.yaml 引入
#
# 触发逻辑：
#   - 桌面区域检测到人 → 开启显示器挂灯
#   - 书房任意区域检测到人 → 开启吸顶灯
#   - 桌面区域无人超过 5 分钟 → 关闭显示器挂灯
#   - 书房整体无人超过 5 分钟 → 关闭吸顶灯
# ============================================================

# ===== 书房桌面区 - 显示器挂灯 =====

- alias: "书房桌面区 - 有人开挂灯"
  id: presence_study_desk_monitor_light_on
  description: "检测到有人在书房桌面区时，自动打开显示器挂灯"
  trigger:
    - platform: state
      entity_id: binary_sensor.desk_area_person_occupancy
      to: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.yeelink_cn_706876323_lamp22_s_2
      data:
        brightness_pct: 100
  mode: single

- alias: "书房桌面区 - 无人关挂灯"
  id: presence_study_desk_monitor_light_off
  description: "书房桌面区无人超过 5 分钟后，自动关闭显示器挂灯"
  trigger:
    - platform: state
      entity_id: binary_sensor.desk_area_person_occupancy
      to: "off"
      for:
        minutes: 5
  action:
    - service: light.turn_off
      target:
        entity_id: light.yeelink_cn_706876323_lamp22_s_2
  mode: single

# ===== 书房整体 - 吸顶灯 =====

- alias: "书房 - 有人开大灯"
  id: presence_study_ceiling_light_on
  description: "检测到有人在书房时，自动打开吸顶灯"
  trigger:
    - platform: state
      entity_id: binary_sensor.study_person_occupancy
      to: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.xiaomi_cn_829060863_ceil03_s_2_light
  mode: single

- alias: "书房 - 无人关大灯"
  id: presence_study_ceiling_light_off
  description: "书房无人超过 5 分钟后，自动关闭吸顶灯"
  trigger:
    - platform: state
      entity_id: binary_sensor.study_person_occupancy
      to: "off"
      for:
        minutes: 5
  action:
    - service: light.turn_off
      target:
        entity_id: light.xiaomi_cn_829060863_ceil03_s_2_light
  mode: single
