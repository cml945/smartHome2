# ============================================================
# Frigate NVR 配置模板
# ============================================================
# 此文件是配置模板，包含 ${VARIABLE} 形式的占位符。
# 请运行 scripts/generate-config.sh 或 make config 来生成实际的 config.yml。
# 不要直接编辑 config.yml（它被 .gitignore 忽略）。
#
# Zone 坐标需要在 Frigate 部署后，通过 Web UI 绘制获取。
# 下面的坐标仅为示例，请根据实际摄像头画面调整。
# ============================================================

# ---------- MQTT 连接（Mosquitto 与 Frigate 在同一 Docker 网络中）----------
mqtt:
  host: mosquitto
  port: 1883

# ---------- go2rtc ----------
# 视频流由独立的 go2rtc 容器提供（支持小米 xiaomi:// 协议）
# go2rtc 使用 host 网络模式以支持 P2P UDP 协议
# Frigate 通过 host.docker.internal 访问 go2rtc 的 RTSP 输出

# ---------- 检测器配置 ----------
# 当前使用 CPU 检测器（Frigate 0.15.0 不支持 apple_silicon 类型）
# 升级到 Frigate 0.17+ 后可改用 apple_silicon 检测器以提升性能
detectors:
  cpu_detector:
    type: cpu
  # apple_silicon（需 Frigate 0.17+）:
  # apple_silicon:
  #   type: apple_silicon
  #   address: host.docker.internal:${DETECTOR_ZMQ_PORT}
  #   model:
  #     path: ${DETECTOR_MODEL}

# ---------- 摄像头及区域检测配置 ----------
cameras:
  # ========================
  # 书房摄像头（小米智能摄像机云台版Pro）
  # ========================
  study:
    ffmpeg:
      inputs:
        - path: rtsp://host.docker.internal:8554/study_cam
          roles: ["detect"]
    detect:
      width: 1280
      height: 720
      fps: 1  # 每秒检测一次
    # Zone 定义 —— 坐标为归一化值 (0.0~1.0)
    # 请在 Frigate Web UI 中拖拽绘制，然后将坐标复制到这里
    # 下面是示例坐标，需根据实际摄像头画面调整
    zones:
      desk_area:
        coordinates: 0.1,0.1,0.9,0.1,0.9,0.9,0.1,0.9
        # 提示：坐标格式为 x1,y1,x2,y2,x3,y3,x4,y4（多边形顶点）
    objects:
      track:
        - person  # 仅检测人体
      filters:
        person:
          min_score: 0.5    # 最低检测置信度
          min_area: 5000    # 最小检测区域（像素面积），过滤远处的误检
    # 可选：遮罩区域（屏蔽窗户等容易产生误报的区域）
    # motion:
    #   mask:
    #     - 0.0,0.0,0.2,0.0,0.2,0.3,0.0,0.3
    snapshots:
      enabled: true
      bounding_box: true
    record:
      enabled: false  # 默认不录像，如需录像改为 true

  # ========================
  # 客厅摄像头
  # ========================
  living_room:
    ffmpeg:
      inputs:
        - path: rtsp://host.docker.internal:8554/living_room_cam
          roles: ["detect"]
    detect:
      width: 1280
      height: 720
      fps: 1
    zones:
      sofa_area:
        coordinates: 0.0,0.5,0.4,0.5,0.4,1.0,0.0,1.0
      dining_area:
        coordinates: 0.5,0.5,0.9,0.5,0.9,1.0,0.5,1.0
    objects:
      track:
        - person
      filters:
        person:
          min_score: 0.5
          min_area: 5000
    snapshots:
      enabled: true
      bounding_box: true
    record:
      enabled: false

  # ========================
  # 如需添加更多摄像头，参照以下模板：
  # ========================
  # living_room:
  #   ffmpeg:
  #     inputs:
  #       - path: rtsp://host.docker.internal:8554/living_room_cam
  #         roles: ["detect"]
  #   detect:
  #     width: 1280
  #     height: 720
  #     fps: 1
  #   zones:
  #     sofa_area:
  #       coordinates: 0.0,0.5,0.4,0.5,0.4,1.0,0.0,1.0
  #   objects:
