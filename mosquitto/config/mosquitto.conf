# Mosquitto MQTT Broker 配置
# 运行在 Mac Docker 中，供 Frigate 和 HA 共同使用

# 监听端口
listener 1883
protocol mqtt

# WebSocket 端口（可选，用于调试）
listener 9001
protocol websockets

# 允许匿名访问（简化配置，局域网内使用）
# 如需认证，改为 false 并配置 password_file
allow_anonymous true

# 持久化
persistence true
persistence_location /mosquitto/data/

# 日志
log_dest file /mosquitto/log/mosquitto.log
log_type all
